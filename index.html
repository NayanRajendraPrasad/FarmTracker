<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Farm Tracker</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#43cea2,#185a9d);
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
color:white;
}

.form{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#27ae60;
color:white;
border:none;
}

.columns{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.column{
background:white;
padding:15px;
border-radius:10px;
}

.card{
background:#f5f5f5;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.delete{
background:red;
margin-top:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>🐄 Farm Tracker</h1>

<div class="form">

<input id="name" placeholder="Cow Name">

<select id="type">
<option>Pregnancy</option>
<option>Heat</option>
</select>

<input type="date" id="date">

<button onclick="addCow()">Add Cow</button>

</div>

<div class="columns">

<div class="column">
<h3>🐄 Pregnancy</h3>
<div id="pregnancy"></div>
</div>

<div class="column">
<h3>🔥 Heat</h3>
<div id="heat"></div>
</div>

</div>

</div>

<script>

/* 🔴 YOUR LINKS */
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbygvaiuRXEXRnUiBLw98Rsx3JhZh_kAegMSTJ67YkpGDjXuWQWxIofXeviu-yGI9yUf/exec"

const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQRMTIQyMhKfxcU4cyFhPBrkpYjPq7_5AsrZXMD_gOw3_5JBGQayb-2-U7zKF4gem8YuQHLapytSofE/pub?output=csv"

const GESTATION=280
const HEAT=21


/* ADD */
function addCow(){

let n=document.getElementById("name").value
let t=document.getElementById("type").value
let d=document.getElementById("date").value

if(!n || !d){
alert("Enter all details")
return
}

fetch(SCRIPT_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"add",
name:n,
type:t,
date:d
})
})
.then(()=>location.reload())

}


/* DELETE */
function deleteCow(name,type,date){

fetch(SCRIPT_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
action:"delete",
name:name,
type:type,
date:date
})
})
.then(()=>location.reload())

}


/* LOAD DATA */
fetch(SHEET_URL)
.then(r=>r.text())
.then(csv=>{

pregnancy.innerHTML=""
heat.innerHTML=""

let rows=csv.split("\n").slice(1)

rows.forEach(r=>{

let c=r.split(",")

if(!c[0]||!c[1]||!c[2]) return

processCow(c[0].trim(),c[1].trim(),c[2].trim())

})

})


function processCow(name,type,date){

let start=new Date(date)
let today=new Date()

let diff=Math.floor((today-start)/86400000)
if(diff<0) diff=0


/* PREGNANCY */
if(type.toLowerCase()=="pregnancy"){

let remain=GESTATION-diff
if(remain<0) remain=0

let delivery=new Date(start.getTime()+GESTATION*86400000)

pregnancy.innerHTML+=`
<div class="card">
<b>${name}</b><br>
Remaining: ${remain} days<br>
Delivery: ${delivery.toLocaleDateString('en-IN')}

<button class="delete"
onclick="deleteCow('${name}','${type}','${date}')">
Delete
</button>
</div>
`
}


/* HEAT */
if(type.toLowerCase()=="heat"){

let cycle=Math.floor(diff/HEAT)

let next=new Date(start)
next.setDate(start.getDate()+(cycle+1)*HEAT)

let remain=Math.ceil((next-today)/86400000)
if(remain<0) remain=0

heat.innerHTML+=`
<div class="card">
<b>${name}</b><br>
Next Heat In: ${remain} days<br>
Next Heat: ${next.toLocaleDateString('en-IN')}

<button class="delete"
onclick="deleteCow('${name}','${type}','${date}')">
Delete
</button>
</div>
`
}

}

</script>

</body>
</html>
