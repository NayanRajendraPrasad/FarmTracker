<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Farm Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2, #43cea2);
      background-size: 300% 300%;
      animation: gradientBG 8s ease infinite;
      padding: 15px;
      color: #333;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h2 {
      text-align: center;
      color: white;
      margin-bottom: 15px;
    }

    .form {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      background: rgba(255,255,255,0.95);
      padding: 15px;
      border-radius: 12px;
    }

    input, select {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px 15px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #28a745;
      color: white;
      font-weight: bold;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 20px;
    }

    .column {
      flex: 1;
      min-width: 320px;
      background: rgba(255,255,255,0.95);
      padding: 15px;
      border-radius: 12px;
    }

    .column h3 {
      text-align: center;
      margin-bottom: 10px;
    }

    .card {
      background: #f9fbff;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border-left: 5px solid #3498db;
    }

    .edit {
      background: orange;
      margin-top: 8px;
    }

    .delete {
      background: red;
      margin-top: 8px;
      color: white;
    }

    .msg {
      text-align: center;
      margin-top: 10px;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Farm Tracker</h2>

<div class="form">
  <input id="name" placeholder="Cow Name">
  <select id="type">
    <option value="">Type</option>
    <option value="Pregnancy">Pregnancy</option>
    <option value="Heat">Heat</option>
  </select>
  <input type="date" id="date">
  <button onclick="addCow()">Add</button>
</div>

<div class="msg" id="msg"></div>

<div class="container">
  <div class="column">
    <h3>Pregnancy</h3>
    <div id="preg"></div>
  </div>

  <div class="column">
    <h3>Heat Cycle</h3>
    <div id="heat"></div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCleV5zh1j0cADyxK60vMjczILUZvI7eQw",
  authDomain: "farm-tracker-db275.firebaseapp.com",
  databaseURL: "https://farm-tracker-db275-default-rtdb.firebaseio.com",
  projectId: "farm-tracker-db275",
  storageBucket: "farm-tracker-db275.firebasestorage.app",
  messagingSenderId: "224673403017",
  appId: "1:224673403017:web:99904a186cbeea96c67658"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const nameInput = document.getElementById("name");
const typeInput = document.getElementById("type");
const dateInput = document.getElementById("date");
const preg = document.getElementById("preg");
const heat = document.getElementById("heat");

function msg(t){ document.getElementById("msg").innerText = t; }

/* ADD */
function addCow(){
  const name = nameInput.value.trim();
  const type = typeInput.value;
  const date = dateInput.value;

  if(!name || !type || !date){
    msg("Fill all fields"); return;
  }

  const id = name + "_" + date;

  db.ref("cows/"+id).set({name,type,date})
    .then(()=>msg("Added successfully"));
}

/* DELETE */
function deleteCow(id){
  db.ref("cows/"+id).remove()
    .then(()=>msg("Deleted successfully"));
}

/* EDIT */
function editCow(id, data){
  const name = prompt("Name", data.name);
  const type = prompt("Type", data.type);
  const date = prompt("Date YYYY-MM-DD", data.date);

  if(!name || !type || !date) return;

  db.ref("cows/"+id).set({name,type,date})
    .then(()=>msg("Updated successfully"));
}

/* LOAD */
db.ref("cows").on("value", snap=>{
  const data = snap.val() || {};
  render(data);
});

/* RENDER */
function render(data){
  preg.innerHTML="";
  heat.innerHTML="";

  const today = new Date();

  Object.keys(data).forEach(id=>{
    const item = data[id];
    const start = new Date(item.date);

    let div = document.createElement("div");
    div.className="card";

    const daysCompleted = Math.max(Math.floor((today - start)/(1000*60*60*24)),0);

    if(item.type==="Pregnancy"){
      const monthsCompleted = Math.floor(daysCompleted / 30);
      const remain = Math.max(280 - daysCompleted, 0);

      const delivery = new Date(start);
      delivery.setDate(delivery.getDate()+280);

      div.innerHTML=`
        <b>${item.name}</b><br>
        Completed: ${daysCompleted} days (${monthsCompleted} months)<br>
        Remaining: ${remain} days<br>
        Delivery: ${delivery.toDateString()}<br>
        <button class="edit" onclick='editCow("${id}",${JSON.stringify(item)})'>Edit</button>
        <button class="delete" onclick='deleteCow("${id}")'>Delete</button>
      `;

      preg.appendChild(div);
    }

    if(item.type==="Heat"){
      const next = Math.max(21 - (daysCompleted % 21), 0);

      div.innerHTML=`
        <b>${item.name}</b><br>
        Days completed: ${daysCompleted} days<br>
        Next heat in: ${next} days<br>
        <button class="edit" onclick='editCow("${id}",${JSON.stringify(item)})'>Edit</button>
        <button class="delete" onclick='deleteCow("${id}")'>Delete</button>
      `;

      heat.appendChild(div);
    }
  });
}
</script>

</body>
</html>
